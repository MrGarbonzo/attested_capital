version: "3.8"

# IMPORTANT: Edit the image tag below before each deploy.
# The exact docker-compose.yml is measured in RTMR for attestation,
# so the tag must be hardcoded — not a variable.

services:
  boot-agent:
    image: ghcr.io/mrgarbonzo/boot-agent:EDIT_TAG_BEFORE_DEPLOY
    container_name: panthers-boot-agent
    restart: "no"
    env_file: .env
    volumes:
      - sealed-output:/mnt/secure/boot-config

volumes:
  sealed-output:
