version: "3.8"

services:
  boot-agent:
    build:
      context: ..
      dockerfile: boot-agent/Dockerfile
    container_name: panthers-boot-agent
    restart: "no"
    env_file: .env
    volumes:
      # Sealed config output — copy these files to guardian/agent VMs
      - ./sealed-output:/mnt/secure/boot-config
